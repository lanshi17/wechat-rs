# 部署说明：
# 1. 复制 config.toml.example 为 config.toml，填入实际配置
# 2. docker-compose up -d

services:
  app:
    build: .
    image: davepaine/wechat-rs:latest
    container_name: wechat-sever
    restart: unless-stopped
    ports:
      - "3317:3000"
    volumes:
      - ./config.toml:/etc/wechat-rs/config.toml
    environment:
      CONFIG_PATH: /etc/wechat-rs/config.toml
      RUST_LOG:    ${RUST_LOG:-wechat_rs=info,tower_http=debug}
